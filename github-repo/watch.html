<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>movies — cowboysstuff</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #000; }

    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Thin top bar — only visible on hover */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      z-index: 9999;
      transform: translateY(-100%);
      transition: transform 0.2s ease;
    }

    body:hover #topbar,
    #topbar:focus-within {
      transform: translateY(0);
    }

    .bar-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #ccc;
      cursor: pointer;
      height: 26px;
      padding: 0 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .bar-btn:hover { color: #d4a017; border-color: #d4a017; }

    #bar-url {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #eee;
      height: 26px;
      padding: 0 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      outline: none;
    }
    #bar-url:focus { border-color: #d4a017; }

    .bar-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #d4a017;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <span class="bar-label">🎬 movies</span>
    <button class="bar-btn" onclick="goBack()">←</button>
    <button class="bar-btn" onclick="goFwd()">→</button>
    <button class="bar-btn" onclick="reload()">↻</button>
    <input id="bar-url" type="text" spellcheck="false" autocomplete="off"
           value="https://watch.spencerdevs.xyz/"
           onkeydown="if(event.key==='Enter')navigate(this.value)" />
    <button class="bar-btn" onclick="document.getElementById('frame').requestFullscreen?.()">⛶</button>
    <button class="bar-btn" onclick="window.location.href='/'">⌂ home</button>
  </div>

  <iframe id="frame"
          src=""  data-proxysrc="https://watch.spencerdevs.xyz/"
          allowfullscreen
          allow="fullscreen; autoplay; clipboard-write; encrypted-media; picture-in-picture"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
  ></iframe>

  <script src="/js/config.js"></script>
  <script>
    const frame  = document.getElementById('frame');
    const urlBar = document.getElementById('bar-url');
    const PROXY  = (window.PROXY_BASE || '/p/');

    function navigate(v) {
      v = v.trim();
      if (!v) return;
      const target = /^https?:\/\//i.test(v) ? v
        : /^[^\s]+\.[^\s]+$/.test(v) ? 'https://' + v
        : 'https://www.google.com/search?q=' + encodeURIComponent(v);
      frame.src = PROXY + target;
      urlBar.value = target;
      urlBar.blur();
    }

    function goBack()    { history.back(); }
    function goFwd()     { history.forward(); }
    function reload()    { frame.src = frame.src; }

    // Keep URL bar updated as iframe navigates
    frame.addEventListener('load', () => {
      try {
        const src = frame.src || '';
        if (src.startsWith(PROXY)) urlBar.value = src.slice(PROXY.length);
      } catch {}
    });
  </script>
</body>
</html>
